<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReyonX</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: #f1f5f9;
            /* Modern, tüm cihazlarda net görünen sistem fontları */
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        .sidebar {
            width: 240px;
            height: 100vh;
            position: fixed;
            background: #0f172a;
            color: white;
            padding: 20px;
            overflow-y: auto;
        }

        .sidebar h4 {
            margin-bottom: 25px;
            font-weight: 700;
        }

        .menu-title {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 25px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .sidebar a {
            display: block;
            color: #cbd5f5;
            text-decoration: none;
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 4px;
            font-size: 15px;
            transition: all 0.2s ease-in-out;
        }

        .sidebar a:hover {
            background: #1e293b;
            color: #ffffff;
        }

        .sidebar a.logout-btn {
            color: #ef4444;
            font-weight: 600;
        }

        .sidebar a.logout-btn:hover {
            background: #ef4444;
            color: white;
        }

        .content {
            margin-left: 260px;
            padding: 30px;
        }

        /* YAZDIRMA (PRINT) AYARLARI - A4 Kağıdına Tam Oturması İçin Güncellendi */
        @media print {
            @page {
                size: A4;
                margin: 1cm; /* Kağıt kenarlarındaki fiziksel boşluğu azalttık */
            }
            body {
                background: white !important;
                font-size: 14px !important; /* Yazı boyutunu A4'e uygun hale getirdik */
            }
            .sidebar {
                display: none !important;
            }
            .content {
                margin-left: 0 !important;
                padding: 0 !important;
            }
            .container {
                max-width: 100% !important; /* Ekrandaki kutu sınırlarını kaldırıp tam sayfa yaptık */
                width: 100% !important;
                padding: 0 !important;
                margin: 0 !important;
            }
            .card {
                border: none !important;
                box-shadow: none !important;
                padding: 0 !important;
            }
            table {
                width: 100% !important;
            }
            th, td {
                padding: 10px 5px !important; /* Tablo içindeki sıkışıklığı giderdik */
            }
        }
    </style>
</head>

<body>

<div class="sidebar">

    <h4>🚀 ReyonX</h4>

    <div class="menu-title">GENEL</div>
    <a href="/">Ana Sayfa</a>

    <div class="menu-title">TANIMLAR</div>
    <a href="/suppliers">Tedarikçiler</a>
    <a href="/products">Ürünler</a>

    <div class="menu-title">OPERASYON</div>
    <a href="/invoices">Fatura (Alış)</a>
    <a href="/sales">Satış Yükleme</a>
    <a href="/expenses">Giderler</a>

    <div class="menu-title">STOK</div>
    <a href="/wastes">Fire ve Kayıplar</a>
    <a href="/inventory">Envanter & Sayım</a>

    <div class="menu-title">RAPOR VE ARŞİV</div>
    <a href="/report">Kâr & Prim Raporu</a>
    <a href="/periods">Dönem Arşivi</a>
    
    <hr style="border-color: #334155; margin: 20px 0;">
    <a href="/logout" class="logout-btn">Çıkış Yap</a>

</div>

<div class="content">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
