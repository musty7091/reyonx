<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>ReyonX</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: #f1f5f9;
            font-family: Arial, sans-serif;
        }

        .sidebar {
            width: 240px;
            height: 100vh;
            position: fixed;
            background: #0f172a;
            color: white;
            padding: 20px;
        }

        .sidebar h4 {
            margin-bottom: 25px;
        }

        .menu-title {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 20px;
            margin-bottom: 10px;
        }

        .sidebar a {
            display: block;
            color: #cbd5f5;
            text-decoration: none;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 5px;
        }

        .sidebar a:hover {
            background: #1e293b;
            color: white;
        }

        .disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        .content {
            margin-left: 260px;
            padding: 30px;
        }
    </style>
</head>

<body>

<div class="sidebar">

    <h4>🚀 ReyonX</h4>

    <div class="menu-title">GENEL</div>
    <a href="/">Dashboard</a>

    <div class="menu-title">TANIMLAR</div>
    <a href="/suppliers">Tedarikçiler</a>
    <a href="/products">Ürünler</a>

    <div class="menu-title">OPERASYON</div>
    <a href="/invoices">Fatura (Alış)</a>
    <a href="/sales" style="color: white; text-decoration: none;">Satış Yükleme</a>
    <a class="disabled">Giderler</a>

    <div class="menu-title">STOK</div>
    <a href="/wastes">Fire ve Kayıplar</a>
    <a href="/inventory">Envanter & Sayım</a>

    <div class="menu-title">RAPOR</div>
    <a href="/report" style="color: white; text-decoration: none;">Kâr & Prim</a>
    <hr>
    <a href="/logout" style="color:#ef4444;">Çıkış Yap</a>

</div>

<div class="content">
    {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
