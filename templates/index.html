{% extends "base.html" %}
{% block content %}
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>ReyonX</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f1f5f9;
            color: #0f172a;
        }

        h1 {
            font-weight: 700;
        }

        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .table thead {
            color: #64748b;
        }

        .table-hover tbody tr:hover {
            background-color: #f8fafc;
        }

        input {
            background: #f9fafb !important;
            border: 1px solid #e2e8f0 !important;
            color: #0f172a !important;
        }

        input::placeholder {
            color: #94a3b8;
        }

        .btn-success {
            background: #22c55e;
            border: none;
        }

        .btn-warning {
            background: #facc15;
            border: none;
            color: black;
        }

        .btn-danger {
            background: #ef4444;
            border: none;
        }

        .container {
            max-width: 1100px;
        }
    </style>
</head>
<body>

<div class="container mt-5">

    <!-- 🔥 DASHBOARD -->
    <div class="row mb-4">

        <div class="col-md-4">
            <div class="card p-3 text-center">
                <h6>Toplam Ürün</h6>
                <h3>{{ total_products }}</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3 text-center">
                <h6>Toplam Değer</h6>
                <h3>{{ total_value }} TL</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3 text-center">
                <h6>Ortalama Fiyat</h6>
                <h3>{{ avg_price }} TL</h3>
            </div>
        </div>

    </div>

    <!-- 🔥 BAŞLIK -->
    <h1 class="mb-4">🚀 ReyonX Ürün Yönetimi</h1>

    <!-- 🔥 FORM -->
    <div class="card p-4 mb-4">
        
    </div>

</div>

</body>
</html>
{% endblock %}
