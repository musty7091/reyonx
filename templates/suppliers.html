{% extends "base.html" %}
{% block content %}
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Tedarikçiler</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2>Tedarikçiler</h2>

    <form method="POST" class="row g-3 mb-4">
        <div class="col-md-4">
            <input name="name" class="form-control" placeholder="Firma adı" required>
        </div>
        <div class="col-md-4">
            <input name="contact" class="form-control" placeholder="Yetkili">
        </div>
        <div class="col-md-4">
            <input name="phone" class="form-control" placeholder="Telefon">
        </div>
        <button class="btn btn-success">Ekle</button>
    </form>

    <table class="table table-bordered">
        <tr>
            <th>Firma</th>
            <th>Yetkili</th>
            <th>Telefon</th>
        </tr>

        {% for s in suppliers %}
        <tr>
            <td>{{ s.name }}</td>
            <td>{{ s.contact_person }}</td>
            <td>{{ s.phone }}</td>
        </tr>
        {% endfor %}

    </table>

</div>

</body>
</html>
{% endblock %}
