<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReyonX - Yönetici Girişi</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #0f172a; /* Sistemin ana lacivert tonu */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .login-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h3 class="text-center fw-bold mb-4">🚀 ReyonX</h3>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} fw-bold text-center py-2" role="alert">
                {% if category == 'danger' %} ❌ {% else %} ✅ {% endif %} {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-bold text-muted small text-uppercase">Kullanıcı Adı</label>
                <input type="text" name="username" class="form-control form-control-lg bg-light" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold text-muted small text-uppercase">Şifre</label>
                <input type="password" name="password" class="form-control form-control-lg bg-light" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold py-3 fs-5">Giriş Yap</button>
        </form>
    </div>

</body>
</html>
